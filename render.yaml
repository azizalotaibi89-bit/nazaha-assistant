services:
  - type: web
    name: nazaha-assistant
    env: python
    region: frankfurt
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # ← ستُدخله يدوياً في لوحة Render
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: PYTHON_VERSION
        value: "3.11.0"
