<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مستشار نزاهة — هيئة مكافحة الفساد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════════════════════
       VARIABLES & RESET
    ═══════════════════════════════════════════════════════════ */
    :root {
      --bg:            #0f1117;
      --surface:       #171a24;
      --surface-2:     #1e2233;
      --surface-3:     #252a3a;
      --gold:          #c8a84e;
      --gold-light:    #dfc06a;
      --gold-dim:      rgba(200,168,78,.18);
      --navy:          #1a2e5e;
      --navy-light:    #22407a;
      --text:          #e6e8f0;
      --text-muted:    #7a7f9a;
      --text-dim:      #4a4f6a;
      --border:        #282d42;
      --border-light:  #323754;
      --user-bubble:   #1a2e5e;
      --bot-bubble:    #171a24;
      --radius:        14px;
      --radius-sm:     8px;
      --shadow:        0 4px 24px rgba(0,0,0,.45);
      --shadow-sm:     0 2px 8px rgba(0,0,0,.3);
      --transition:    .22s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Cairo', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════════════════════
       BACKGROUND
    ═══════════════════════════════════════════════════════════ */
    #bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('/static/bg.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    #bg-overlay {
      position: fixed; inset: 0; z-index: 1;
      background: linear-gradient(
        160deg,
        rgba(15,17,23,.93) 0%,
        rgba(10,14,28,.88) 50%,
        rgba(15,17,23,.93) 100%
      );
    }
    /* إذا لم توجد صورة خلفية — gradient جميل كـ fallback */
    #bg-layer:not([style*="bg.jpg"]),
    #bg-layer[style=""] {
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(26,46,94,.6) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(200,168,78,.1) 0%, transparent 60%),
        linear-gradient(135deg, #0a0d1a 0%, #0f1117 50%, #0a0e1f 100%);
    }

    /* ═══════════════════════════════════════════════════════════
       LAYOUT
    ═══════════════════════════════════════════════════════════ */
    #app {
      position: relative; z-index: 2;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ═══════════════════════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════════════════════ */
    #header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 22px;
      background: rgba(23,26,36,.85);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      flex-shrink: 0;
    }

    #header .logo-wrap {
      width: 52px; height: 52px;
      background: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px var(--gold-dim), var(--shadow-sm);
    }

    #header .logo-wrap img {
      width: 46px; height: 46px;
      object-fit: contain;
    }

    #header .titles { flex: 1; }

    #header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: -.02em;
      line-height: 1.2;
    }

    #header p {
      font-size: .78rem;
      color: var(--text-muted);
      font-weight: 400;
      margin-top: 2px;
    }

    #header .badge {
      display: flex; align-items: center; gap: 5px;
      font-size: .7rem;
      padding: 4px 10px;
      background: var(--gold-dim);
      border: 1px solid rgba(200,168,78,.3);
      border-radius: 20px;
      color: var(--gold);
      white-space: nowrap;
      flex-shrink: 0;
    }
    #header .badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════════════════════════
       CHAT AREA
    ═══════════════════════════════════════════════════════════ */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    #chat-area::-webkit-scrollbar { width: 4px; }
    #chat-area::-webkit-scrollbar-track { background: transparent; }
    #chat-area::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

    /* ─ Welcome Screen ─ */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      padding: 40px 20px;
      gap: 14px;
      animation: fadeIn .5s ease;
    }

    #welcome .welcome-icon {
      width: 70px; height: 70px;
      background: var(--gold-dim);
      border: 1px solid rgba(200,168,78,.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin-bottom: 4px;
    }

    #welcome h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--gold);
    }

    #welcome p {
      font-size: .9rem;
      color: var(--text-muted);
      max-width: 460px;
      line-height: 1.7;
    }

    .suggestion-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 520px;
      width: 100%;
      margin-top: 8px;
    }

    .suggestion-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      text-align: right;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text);
      font-family: inherit;
      font-size: .82rem;
      line-height: 1.5;
    }

    .suggestion-btn:hover {
      border-color: rgba(200,168,78,.4);
      background: var(--surface-3);
      color: var(--gold-light);
      transform: translateY(-1px);
    }

    .suggestion-btn .s-icon {
      font-size: 1rem;
      display: block;
      margin-bottom: 4px;
    }

    /* ─ Message Bubbles ─ */
    .msg-wrap {
      display: flex;
      flex-direction: column;
      animation: slideUp .28s ease;
    }

    .msg-wrap.user { align-items: flex-start; }
    .msg-wrap.bot  { align-items: flex-end; }

    .bubble {
      max-width: 82%;
      padding: 13px 17px;
      border-radius: var(--radius);
      font-size: .9rem;
      line-height: 1.75;
      position: relative;
    }

    .bubble.user {
      background: var(--user-bubble);
      border: 1px solid rgba(255,255,255,.07);
      border-top-right-radius: 4px;
    }

    .bubble.bot {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      box-shadow: var(--shadow-sm);
    }

    /* ─ Markdown in bot bubbles ─ */
    .bubble.bot strong, .bubble.bot b { color: var(--gold-light); font-weight: 700; }
    .bubble.bot em, .bubble.bot i { color: var(--text-muted); font-style: italic; }

    .bubble.bot h1,.bubble.bot h2,.bubble.bot h3 {
      color: var(--gold);
      font-size: 1rem;
      font-weight: 700;
      margin: 12px 0 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--gold-dim);
    }

    .bubble.bot ul, .bubble.bot ol {
      padding-right: 20px;
      margin: 8px 0;
    }

    .bubble.bot li {
      margin-bottom: 5px;
    }

    .bubble.bot blockquote {
      border-right: 3px solid var(--gold);
      background: var(--surface-3);
      padding: 8px 14px;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin: 10px 0;
      color: var(--text-muted);
      font-style: italic;
    }

    .bubble.bot code {
      background: var(--surface-3);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: .85em;
      color: var(--gold-light);
      font-family: 'Cairo', monospace;
    }

    .bubble.bot hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0;
    }

    .bubble.bot p { margin-bottom: 8px; }
    .bubble.bot p:last-child { margin-bottom: 0; }

    /* ─ Sources chips ─ */
    .sources-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-width: 82%;
      margin-top: 6px;
      justify-content: flex-end;
    }

    .source-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 10px;
      background: var(--surface-3);
      border: 1px solid rgba(200,168,78,.25);
      border-radius: 20px;
      font-size: .72rem;
      color: var(--gold);
      cursor: default;
    }

    .source-chip svg { flex-shrink: 0; }

    /* ─ Typing indicator ─ */
    .typing-dots {
      display: flex; align-items: center; gap: 5px;
      padding: 14px 18px;
    }

    .typing-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gold);
      opacity: .4;
      animation: dotPulse 1.4s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .22s; }
    .typing-dots span:nth-child(3) { animation-delay: .44s; }

    /* ─ Timestamp ─ */
    .msg-time {
      font-size: .68rem;
      color: var(--text-dim);
      margin-top: 4px;
      padding: 0 4px;
    }

    /* ─ Error bubble ─ */
    .bubble.error {
      background: rgba(239,68,68,.12);
      border-color: rgba(239,68,68,.3);
      color: #f87171;
    }

    /* ═══════════════════════════════════════════════════════════
       INPUT AREA
    ═══════════════════════════════════════════════════════════ */
    #input-area {
      padding: 14px 16px 16px;
      background: rgba(23,26,36,.9);
      backdrop-filter: blur(18px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #input-form {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 100%;
    }

    #q {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-family: inherit;
      font-size: .9rem;
      color: var(--text);
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 46px;
      line-height: 1.5;
      transition: border-color var(--transition);
    }

    #q::placeholder { color: var(--text-dim); }

    #q:focus { border-color: rgba(200,168,78,.5); }

    #send-btn {
      width: 46px; height: 46px;
      flex-shrink: 0;
      background: var(--gold);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
      color: #0f1117;
    }

    #send-btn:hover:not(:disabled) {
      background: var(--gold-light);
      transform: scale(1.05);
    }

    #send-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    #send-btn svg { width: 20px; height: 20px; }

    .char-hint {
      font-size: .7rem;
      color: var(--text-dim);
      text-align: center;
      margin-top: 6px;
    }

    /* ═══════════════════════════════════════════════════════════
       CLEAR BUTTON
    ═══════════════════════════════════════════════════════════ */
    #clear-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: var(--transition);
      flex-shrink: 0;
    }
    #clear-btn:hover { border-color: rgba(200,168,78,.4); color: var(--gold); }
    #clear-btn svg { width: 16px; height: 16px; }

    /* ═══════════════════════════════════════════════════════════
       ANIMATIONS
    ═══════════════════════════════════════════════════════════ */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes dotPulse {
      0%,60%,100% { transform: translateY(0); opacity: .4; }
      30%         { transform: translateY(-5px); opacity: 1; }
    }

    /* ═══════════════════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════════════════ */
    @media (max-width: 600px) {
      #header { padding: 10px 14px; }
      #header .badge { display: none; }
      .bubble { max-width: 92%; }
      .suggestion-grid { grid-template-columns: 1fr; }
      .sources-row { max-width: 92%; }
    }

    /* ─ Cursor blink for streaming ─ */
    .streaming::after {
      content: '▍';
      animation: blink .7s step-end infinite;
      color: var(--gold);
    }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>

<!-- خلفية -->
<div id="bg-layer"></div>
<div id="bg-overlay"></div>

<div id="app">

  <!-- HEADER -->
  <header id="header">
    <div class="logo-wrap">
      <img src="/static/logo.png" alt="شعار نزاهة" onerror="this.style.display='none';this.parentElement.innerHTML='<svg width=32 height=32 viewBox=\'0 0 24 24\' fill=\'%231a2e5e\'><path d=\'M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5\' stroke=\'%23c8a84e\' stroke-width=1.5 fill=\'none\'/></svg>'" />
    </div>
    <div class="titles">
      <h1>مستشار نزاهة القانوني</h1>
      <p>هيئة مكافحة الفساد — دولة الكويت</p>
    </div>
    <div class="badge">متصل</div>
    <button id="clear-btn" title="محادثة جديدة">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
      </svg>
    </button>
  </header>

  <!-- CHAT -->
  <div id="chat-area">
    <div id="welcome">
      <div class="welcome-icon">⚖️</div>
      <h2>مستشار نزاهة القانوني</h2>
      <p>يمكنك سؤالي عن أي شيء يتعلق بقوانين ولوائح هيئة مكافحة الفساد. إجاباتي مستندة حصراً إلى الوثائق الرسمية للهيئة.</p>
      <div class="suggestion-grid">
        <button class="suggestion-btn" onclick="setQ(this.dataset.q)" data-q="ما صلاحيات هيئة مكافحة الفساد نزاهة؟">
          <span class="s-icon">🏛️</span>صلاحيات هيئة نزاهة
        </button>
        <button class="suggestion-btn" onclick="setQ(this.dataset.q)" data-q="ما الجهات الخاضعة لرقابة هيئة نزاهة؟">
          <span class="s-icon">🔍</span>الجهات الخاضعة للرقابة
        </button>
        <button class="suggestion-btn" onclick="setQ(this.dataset.q)" data-q="ما شروط تقديم الكشف عن الذمة المالية؟">
          <span class="s-icon">📋</span>الكشف عن الذمة المالية
        </button>
        <button class="suggestion-btn" onclick="setQ(this.dataset.q)" data-q="ما عقوبات الفساد المنصوص عليها في القانون؟">
          <span class="s-icon">⚖️</span>عقوبات الفساد في القانون
        </button>
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <div id="input-area">
    <form id="input-form" onsubmit="return false;">
      <textarea
        id="q"
        placeholder="اكتب سؤالك القانوني..."
        rows="1"
        autofocus
      ></textarea>
      <button type="submit" id="send-btn" title="إرسال">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </form>
    <p class="char-hint">اضغط Enter للإرسال • Shift+Enter لسطر جديد</p>
  </div>

</div><!-- #app -->

<!-- ═══════════════════════════════════════════════════════
     MARKED.JS (Markdown renderer)
═══════════════════════════════════════════════════════ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

<script>
/* ══════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
let history      = [];   // [{role, content}]
let isStreaming  = false;

const chatArea   = document.getElementById('chat-area');
const welcome    = document.getElementById('welcome');
const qInput     = document.getElementById('q');
const sendBtn    = document.getElementById('send-btn');
const clearBtn   = document.getElementById('clear-btn');
const inputForm  = document.getElementById('input-form');

/* configure marked */
marked.setOptions({
  breaks: true,
  gfm: true,
  headerIds: false,
  mangle: false,
});

/* ══════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════ */
function nowTime() {
  return new Date().toLocaleTimeString('ar-KW', {hour:'2-digit', minute:'2-digit'});
}

function scrollBottom(smooth = true) {
  setTimeout(() => {
    chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
  }, 30);
}

function hideWelcome() {
  if (welcome) { welcome.style.display = 'none'; }
}

function setQ(text) {
  qInput.value = text;
  qInput.dispatchEvent(new Event('input'));
  qInput.focus();
}

/* Auto-resize textarea */
qInput.addEventListener('input', () => {
  qInput.style.height = 'auto';
  qInput.style.height = Math.min(qInput.scrollHeight, 120) + 'px';
});

/* ══════════════════════════════════════════════════════════
   RENDER MESSAGES
══════════════════════════════════════════════════════════ */
function appendUserMessage(text) {
  hideWelcome();
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap user';
  wrap.innerHTML = `
    <div class="bubble user">${escapeHtml(text)}</div>
    <div class="msg-time">${nowTime()}</div>
  `;
  chatArea.appendChild(wrap);
  scrollBottom();
  return wrap;
}

function createBotBubble() {
  hideWelcome();
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap bot';
  wrap.innerHTML = `
    <div class="bubble bot">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div class="sources-row" id="sources-${Date.now()}"></div>
    <div class="msg-time"></div>
  `;
  chatArea.appendChild(wrap);
  scrollBottom();
  return wrap;
}

function renderSources(container, sources) {
  if (!sources || !sources.length) return;
  container.innerHTML = sources.map(s => {
    const label = s.section
      ? `${s.source} | ${s.section}`
      : `${s.source} | ص${s.page}`;
    return `
      <div class="source-chip" title="${label}">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        ${escapeHtml(label.length > 55 ? label.substring(0, 52) + '…' : label)}
      </div>`;
  }).join('');
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ══════════════════════════════════════════════════════════
   SEND MESSAGE
══════════════════════════════════════════════════════════ */
async function sendMessage() {
  const question = qInput.value.trim();
  if (!question || isStreaming) return;

  isStreaming = true;
  sendBtn.disabled = true;
  qInput.value = '';
  qInput.style.height = 'auto';

  appendUserMessage(question);

  const botWrap   = createBotBubble();
  const bubble    = botWrap.querySelector('.bubble.bot');
  const sourcesEl = botWrap.querySelector('[id^="sources-"]');
  const timeEl    = botWrap.querySelector('.msg-time');

  let fullText = '';
  let streamStarted = false;

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, history }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: 'خطأ غير معروف' }));
      bubble.className = 'bubble error';
      bubble.textContent = err.error || 'حدث خطأ في الخادم';
      return;
    }

    const reader   = res.body.getReader();
    const decoder  = new TextDecoder();
    let   buffer   = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (!raw) continue;
        let payload;
        try { payload = JSON.parse(raw); } catch { continue; }

        if (payload.type === 'sources') {
          renderSources(sourcesEl, payload.sources);
        }
        else if (payload.type === 'text') {
          if (!streamStarted) {
            bubble.innerHTML = '';
            streamStarted = true;
          }
          fullText += payload.content;
          bubble.innerHTML = marked.parse(fullText);
          bubble.classList.add('streaming');
          scrollBottom(false);
        }
        else if (payload.type === 'done') {
          bubble.classList.remove('streaming');
          history.push({ role: 'user',      content: question });
          history.push({ role: 'assistant', content: fullText });
          // احتفظ بآخر 10 أدوار (5 تبادلات) فقط
          if (history.length > 20) history = history.slice(-20);
          timeEl.textContent = nowTime();
        }
        else if (payload.type === 'error') {
          bubble.classList.remove('streaming');
          bubble.className = 'bubble error';
          bubble.textContent = payload.message || 'حدث خطأ';
        }
      }
    }
  } catch (err) {
    bubble.className = 'bubble error';
    bubble.textContent = 'تعذر الاتصال بالخادم: ' + err.message;
  } finally {
    bubble.classList.remove('streaming');
    isStreaming  = false;
    sendBtn.disabled = false;
    qInput.focus();
    scrollBottom();
  }
}
