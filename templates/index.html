<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>مستشار نزاهة — الهيئة العامة لمكافحة الفساد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #0d1117;
      --bg-2:        #161b22;
      --bg-3:        #1c2128;
      --surface:     #21262d;
      --border:      rgba(255,255,255,.08);
      --border-2:    rgba(255,255,255,.13);
      --gold:        #d4a843;
      --gold-dim:    rgba(212,168,67,.15);
      --gold-border: rgba(212,168,67,.35);
      --text:        #e6edf3;
      --text-muted:  #8b949e;
      --text-dim:    #484f58;
      --user-bg:     #1a3a6a;
      --user-border: rgba(99,153,230,.25);
      --radius:      12px;
      --radius-sm:   8px;
      --max-w:       780px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Cairo', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 56px;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 32px; height: 32px;
      object-fit: contain;
      border-radius: 6px;
    }

    .header-title {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .header-title .name {
      font-size: .85rem;
      font-weight: 700;
      color: var(--text);
    }

    .header-title .sub {
      font-size: .7rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .header-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #2ea043;
      box-shadow: 0 0 6px rgba(46,160,67,.6);
    }

    #clear-btn {
      background: transparent;
      border: 1px solid var(--border-2);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px 12px;
      font-family: inherit;
      font-size: .75rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: .18s;
    }
    #clear-btn:hover { border-color: var(--gold-border); color: var(--gold); }
    #clear-btn svg { width: 13px; height: 13px; }

    /* ── Chat area ── */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      scroll-behavior: smooth;
    }
    #chat-area { scrollbar-width: thin; scrollbar-color: var(--surface) transparent; }
    #chat-area::-webkit-scrollbar { width: 4px; }
    #chat-area::-webkit-scrollbar-track { background: transparent; }
    #chat-area::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 4px; }

    /* ── Welcome screen ── */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100% - 40px);
      padding: 40px 24px;
      gap: 12px;
      text-align: center;
    }

    .welcome-logo {
      width: 120px; height: 120px;
      object-fit: contain;
      margin-bottom: 4px;
    }

    .welcome-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: .72rem;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 4px;
    }

    #welcome h1 {
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1.3;
    }

    #welcome p { display: none; }

    .suggestion-grid { display: none; }

    /* ── Messages ── */
    .msg-row {
      display: flex;
      padding: 0 20px;
      max-width: var(--max-w);
      margin: 0 auto;
      animation: fadeSlide .22s ease;
      width: 100%;
    }

    /* separator line between exchanges */
    .msg-row + .msg-row.bot-row { border-top: 1px solid var(--border); padding-top: 24px; }

    /* USER — card bubble on the right */
    .msg-row.user-row {
      justify-content: flex-start;
      padding-top: 20px;
      padding-bottom: 4px;
    }

    .user-bubble {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      border-radius: var(--radius);
      border-top-right-radius: 3px;
      padding: 12px 16px;
      max-width: 78%;
      font-size: .9rem;
      line-height: 1.7;
      color: #cfe2ff;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }

    /* BOT — plain text like ChatGPT, full width */
    .msg-row.bot-row {
      flex-direction: column;
      padding-top: 20px;
      padding-bottom: 20px;
    }

    .bot-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .bot-avatar {
      width: 26px; height: 26px;
      border-radius: 6px;
      background: linear-gradient(135deg, #c8940a, #d4a843);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: .7rem;
      color: #0d1117;
      font-weight: 700;
    }

    .bot-name {
      font-size: .75rem;
      font-weight: 600;
      color: var(--gold);
    }

    .bot-text {
      font-size: .92rem;
      line-height: 1.85;
      color: var(--text);
      padding-right: 34px; /* indent under avatar */
    }

    /* Markdown inside bot text */
    .bot-text p { margin-bottom: 10px; }
    .bot-text p:last-child { margin-bottom: 0; }
    .bot-text strong, .bot-text b { color: #f0c060; font-weight: 700; }
    .bot-text h1,.bot-text h2,.bot-text h3 {
      color: var(--gold); font-weight: 700; margin: 16px 0 8px;
      font-size: .95rem; letter-spacing: .01em;
    }
    .bot-text ul, .bot-text ol {
      padding-right: 22px; margin: 8px 0;
    }
    .bot-text li { margin-bottom: 6px; color: #c9d1d9; }
    .bot-text blockquote {
      border-right: 3px solid var(--gold);
      background: rgba(212,168,67,.07);
      padding: 8px 14px; border-radius: 0 6px 6px 0;
      margin: 10px 0; color: var(--text-muted);
    }
    .bot-text code {
      background: var(--surface); padding: 2px 7px;
      border-radius: 4px; font-size: .84em; color: var(--gold);
      border: 1px solid var(--border-2);
    }
    .bot-text hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

    /* Sources chips */
    .sources-row {
      display: flex; flex-wrap: wrap; gap: 5px;
      padding-right: 34px;
      margin-top: 10px;
    }

    .source-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px;
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      border-radius: 20px;
      font-size: .68rem; color: var(--gold);
      cursor: default;
    }
    .source-chip svg { opacity: .7; }

    /* Typing */
    .typing-dots { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
    .typing-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold); opacity: .35;
      animation: dotPulse 1.4s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .22s; }
    .typing-dots span:nth-child(3) { animation-delay: .44s; }

    .msg-time {
      font-size: .65rem;
      color: var(--text-dim);
      margin-top: 6px;
      padding-right: 34px;
    }

    /* ── INPUT AREA ── */
    #input-wrap {
      flex-shrink: 0;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      padding-bottom: max(18px, env(safe-area-inset-bottom, 18px));
    }

    #input-inner {
      max-width: var(--max-w);
      margin: 0 auto;
    }

    #input-form {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--bg-2);
      border: 1px solid var(--border-2);
      border-radius: var(--radius);
      padding: 8px 8px 8px 14px;
      transition: border-color .18s;
    }
    #input-form:focus-within { border-color: rgba(212,168,67,.4); }

    #q {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: .9rem;
      color: var(--text);
      resize: none;
      min-height: 28px;
      max-height: 160px;
      line-height: 1.6;
      padding: 4px 0;
    }
    #q::placeholder { color: var(--text-dim); }

    #send-btn {
      width: 36px; height: 36px;
      flex-shrink: 0;
      background: var(--gold);
      border: none;
      border-radius: 7px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: .18s;
      color: #0d1117;
    }
    #send-btn:hover:not(:disabled) { background: #e0b850; transform: scale(1.06); }
    #send-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
    #send-btn svg { width: 17px; height: 17px; }

    .input-hint {
      text-align: center;
      font-size: .68rem;
      color: var(--text-dim);
      margin-top: 8px;
    }

    /* ── Error ── */
    .bot-text.error { color: #f85149; }

    /* ── Animations ── */
    @keyframes fadeSlide { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }
    @keyframes dotPulse {
      0%,60%,100% { transform:translateY(0); opacity:.35 }
      30%          { transform:translateY(-4px); opacity:1 }
    }
    .streaming::after { content:'▍'; animation:blink .65s step-end infinite; color:var(--gold); margin-right: 2px; }
    @keyframes blink { 50% { opacity:0 } }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      #header { padding: 0 14px; height: 52px; }

      .header-title .name { font-size: .78rem; }
      .header-title .sub  { font-size: .65rem; }

      #clear-btn span { display: none; }
      #clear-btn { padding: 7px 10px; }

      #chat-area { -webkit-overflow-scrolling: touch; }

      .msg-row { padding: 0 14px; }
      .msg-row.user-row { padding-top: 16px; }
      .msg-row.bot-row  { padding-top: 16px; padding-bottom: 16px; }

      .user-bubble { max-width: 90%; font-size: .88rem; }

      .bot-text { font-size: .9rem; padding-right: 30px; }
      .sources-row { padding-right: 30px; }
      .msg-time    { padding-right: 30px; }

      #welcome h1 { font-size: 1.2rem; }
      #welcome p  { font-size: .82rem; }
      .welcome-logo { width: 100px; height: 100px; }

      .suggestion-grid {
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .suggestion-btn { padding: 9px 10px; font-size: .77rem; }

      #input-wrap { padding: 10px 14px; padding-bottom: max(16px, env(safe-area-inset-bottom, 16px)); }
      #input-form { padding: 7px 7px 7px 12px; border-radius: 10px; }
      #q { font-size: 16px; }  /* prevents iOS zoom */
      #send-btn { width: 34px; height: 34px; border-radius: 6px; }
      .input-hint { display: none; }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <header id="header">
    <div class="header-brand">
      <img src="/static/logo.png" alt="نزاهة" class="header-logo" onerror="this.style.display='none'" />
      <div class="header-title">
        <span class="name">مستشار نزاهة القانوني</span>
        <span class="sub">الهيئة العامة لمكافحة الفساد — دولة الكويت</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="header-dot" title="متصل"></div>
      <button id="clear-btn" title="محادثة جديدة">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        <span>محادثة جديدة</span>
      </button>
    </div>
  </header>

  <!-- CHAT -->
  <div id="chat-area">
    <div id="welcome">
      <img src="/static/logo.png" alt="نزاهة" class="welcome-logo" onerror="this.style.display='none'" />
      <div class="welcome-badge">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1l3.09 6.26L22 8.27l-5 4.87 1.18 6.88L12 16.77l-6.18 3.25L7 13.14 2 8.27l6.91-1.01L12 1z"/></svg>
        مدعوم بالذكاء الاصطناعي
      </div>
      <h1>مستشار نزاهة القانوني</h1>
    </div>
  </div>

  <!-- INPUT -->
  <div id="input-wrap">
    <div id="input-inner">
      <form id="input-form" onsubmit="return false;">
        <textarea id="q" placeholder="اسأل عن أي قانون كويتي..." rows="1" autofocus></textarea>
        <button type="submit" id="send-btn" title="إرسال">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </form>
      <p class="input-hint">Enter للإرسال &nbsp;·&nbsp; Shift+Enter لسطر جديد</p>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script>
let history     = [];
let isStreaming = false;

const chatArea  = document.getElementById('chat-area');
const qInput    = document.getElementById('q');
const sendBtn   = document.getElementById('send-btn');
const clearBtn  = document.getElementById('clear-btn');
const inputForm = document.getElementById('input-form');

marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });

function nowTime() {
  return new Date().toLocaleTimeString('ar-KW', { hour: '2-digit', minute: '2-digit' });
}
function scrollBottom(smooth = true) {
  requestAnimationFrame(() =>
    chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: smooth ? 'smooth' : 'instant' })
  );
}
function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}
function setQ(text) {
  qInput.value = text;
  qInput.dispatchEvent(new Event('input'));
  qInput.focus();
}

qInput.addEventListener('input', () => {
  qInput.style.height = 'auto';
  qInput.style.height = Math.min(qInput.scrollHeight, 160) + 'px';
});

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function appendUserMessage(text) {
  hideWelcome();
  const row = document.createElement('div');
  row.className = 'msg-row user-row';
  row.innerHTML = `<div class="user-bubble">${escapeHtml(text)}</div>`;
  chatArea.appendChild(row);
  scrollBottom();
}

function createBotRow() {
  hideWelcome();
  const row = document.createElement('div');
  row.className = 'msg-row bot-row';
  row.innerHTML = `
    <div class="bot-header">
      <div class="bot-avatar">ن</div>
      <span class="bot-name">مستشار نزاهة</span>
    </div>
    <div class="bot-text">
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="sources-row"></div>
    <div class="msg-time"></div>`;
  chatArea.appendChild(row);
  scrollBottom();
  return row;
}

function renderSources(container, sources) {
  if (!sources || !sources.length) return;
  const seen = new Set();
  const unique = sources.filter(s => {
    const key = s.section || s.page;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
  container.innerHTML = unique.map(s => {
    const label = s.section ? s.section : `${s.source} ص${s.page}`;
    const display = label.length > 48 ? label.substring(0, 45) + '…' : label;
    return `<div class="source-chip" title="${escapeHtml(s.source)} | ص${s.page}">
      <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      ${escapeHtml(display)}
    </div>`;
  }).join('');
}

async function sendMessage() {
  const question = qInput.value.trim();
  if (!question || isStreaming) return;
  isStreaming = true;
  sendBtn.disabled = true;
  qInput.value = '';
  qInput.style.height = 'auto';

  appendUserMessage(question);
  const botRow  = createBotRow();
  const textEl  = botRow.querySelector('.bot-text');
  const srcEl   = botRow.querySelector('.sources-row');
  const timeEl  = botRow.querySelector('.msg-time');
  let fullText = '', streamStarted = false;

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, history }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: 'خطأ غير معروف' }));
      textEl.classList.add('error');
      textEl.textContent = err.error || 'حدث خطأ في الخادم';
      return;
    }

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (!raw) continue;
        let payload;
        try { payload = JSON.parse(raw); } catch { continue; }

        if (payload.type === 'sources') {
          renderSources(srcEl, payload.sources);
        } else if (payload.type === 'text') {
          if (!streamStarted) { textEl.innerHTML = ''; streamStarted = true; }
          fullText += payload.content;
          textEl.innerHTML = marked.parse(fullText);
          textEl.classList.add('streaming');
          scrollBottom(false);
        } else if (payload.type === 'done') {
          textEl.classList.remove('streaming');
          history.push({ role: 'user', content: question });
          history.push({ role: 'assistant', content: fullText });
          if (history.length > 20) history = history.slice(-20);
          timeEl.textContent = nowTime();
        } else if (payload.type === 'error') {
          textEl.classList.remove('streaming');
          textEl.classList.add('error');
          textEl.textContent = payload.message || 'حدث خطأ';
        }
      }
    }
  } catch (err) {
    textEl.classList.add('error');
    textEl.textContent = 'تعذر الاتصال بالخادم: ' + err.message;
  } finally {
    textEl.classList.remove('streaming');
    isStreaming = false;
    sendBtn.disabled = false;
    qInput.focus();
    scrollBottom();
  }
}

inputForm.addEventListener('submit', sendMessage);
qInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

clearBtn.addEventListener('click', () => {
  history = [];
  chatArea.innerHTML = `
    <div id="welcome">
      <img src="/static/logo.png" alt="نزاهة" class="welcome-logo" onerror="this.style.display='none'" />
      <div class="welcome-badge">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1l3.09 6.26L22 8.27l-5 4.87 1.18 6.88L12 16.77l-6.18 3.25L7 13.14 2 8.27l6.91-1.01L12 1z"/></svg>
        مدعوم بالذكاء الاصطناعي
      </div>
      <h1>مستشار نزاهة القانوني</h1>
    </div>`;
  qInput.focus();
});
</script>
</body>
</html>
