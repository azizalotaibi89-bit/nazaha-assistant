<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مستشار نزاهة — هيئة مكافحة الفساد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #c8dff5;
      --surface:     #d6e8f7;
      --surface-2:   #bdd4ee;
      --gold:        #9a6f00;
      --gold-light:  #b8860b;
      --gold-dim:    rgba(154,111,0,.13);
      --navy:        #1a3558;
      --text:        #0f2540;
      --text-muted:  #3a5a8a;
      --text-dim:    #7aaad0;
      --border:      #a4c3e8;
      --radius:      14px;
      --radius-sm:   8px;
      --shadow:      0 4px 20px rgba(15,37,64,.13);
      --shadow-sm:   0 2px 8px rgba(15,37,64,.09);
      --transition:  .22s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Cairo', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── خلفية ── */
    #bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 10% 10%, rgba(147,197,253,.55) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 90%, rgba(99,163,230,.35) 0%, transparent 55%),
        linear-gradient(160deg, #bdd8f5 0%, #c8dff5 40%, #b5cfe8 100%);
    }

    /* ── Layout ── */
    #app {
      position: relative; z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── زر مسح عائم ── */
    #float-clear {
      position: fixed;
      top: 14px; left: 14px;
      z-index: 20;
      background: rgba(180,210,240,.85);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
    }
    #float-clear:hover { border-color: var(--gold); color: var(--gold); }
    #float-clear svg { width: 16px; height: 16px; }

    /* ── CHAT AREA ── */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }
    #chat-area::-webkit-scrollbar { width: 4px; }
    #chat-area::-webkit-scrollbar-track { background: transparent; }
    #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Welcome ── */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      padding: 40px 20px;
      gap: 10px;
      animation: fadeIn .5s ease;
    }

    #welcome .big-logo {
      width: 190px; height: 190px;
      object-fit: contain;
      mix-blend-mode: multiply;
      filter: sepia(1) saturate(3.5) hue-rotate(5deg) brightness(0.72);
      margin-bottom: 6px;
    }

    #welcome h2 {
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--gold);
    }

    #welcome .subtitle {
      font-size: .88rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    #welcome .desc {
      font-size: .85rem;
      color: var(--text-dim);
      max-width: 440px;
      line-height: 1.7;
      margin-top: 4px;
    }

    .suggestion-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 520px;
      width: 100%;
      margin-top: 10px;
    }

    .suggestion-btn {
      background: rgba(180,210,240,.55);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      text-align: right;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text);
      font-family: inherit;
      font-size: .82rem;
      line-height: 1.5;
    }
    .suggestion-btn:hover {
      border-color: var(--gold);
      background: rgba(180,210,240,.85);
      color: var(--gold);
      transform: translateY(-1px);
    }
    .suggestion-btn .s-icon { font-size: 1rem; display: block; margin-bottom: 4px; }

    /* ── Bubbles ── */
    .msg-wrap { display: flex; flex-direction: column; animation: slideUp .28s ease; }
    .msg-wrap.user { align-items: flex-start; }
    .msg-wrap.bot  { align-items: flex-end; }

    .bubble {
      max-width: 82%;
      padding: 13px 17px;
      border-radius: var(--radius);
      font-size: .9rem;
      line-height: 1.75;
    }

    .bubble.user {
      background: var(--navy);
      color: #e8f2ff;
      border: 1px solid rgba(255,255,255,.08);
      border-top-right-radius: 4px;
    }

    .bubble.bot {
      background: rgba(180,215,248,.7);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      box-shadow: var(--shadow-sm);
      color: var(--text);
    }

    .bubble.bot strong, .bubble.bot b { color: var(--gold); font-weight: 700; }
    .bubble.bot h1,.bubble.bot h2,.bubble.bot h3 {
      color: var(--gold); font-size: 1rem; font-weight: 700;
      margin: 12px 0 6px; padding-bottom: 4px;
      border-bottom: 1px solid var(--gold-dim);
    }
    .bubble.bot ul, .bubble.bot ol { padding-right: 20px; margin: 8px 0; }
    .bubble.bot li { margin-bottom: 5px; }
    .bubble.bot blockquote {
      border-right: 3px solid var(--gold);
      background: rgba(154,111,0,.07);
      padding: 8px 14px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin: 10px 0; color: var(--text-muted); font-style: italic;
    }
    .bubble.bot code {
      background: rgba(154,111,0,.1); padding: 1px 6px;
      border-radius: 4px; font-size: .85em; color: var(--gold);
    }
    .bubble.bot hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
    .bubble.bot p { margin-bottom: 8px; }
    .bubble.bot p:last-child { margin-bottom: 0; }

    .bubble.error {
      background: rgba(239,68,68,.1);
      border-color: rgba(239,68,68,.3);
      color: #b91c1c;
    }

    /* ── Sources ── */
    .sources-row {
      display: flex; flex-wrap: wrap; gap: 6px;
      max-width: 82%; margin-top: 6px; justify-content: flex-end;
    }
    .source-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 10px;
      background: rgba(154,111,0,.1);
      border: 1px solid rgba(154,111,0,.25);
      border-radius: 20px; font-size: .72rem; color: var(--gold);
    }

    /* ── Typing ── */
    .typing-dots { display: flex; align-items: center; gap: 5px; padding: 14px 18px; }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--gold); opacity: .4;
      animation: dotPulse 1.4s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .22s; }
    .typing-dots span:nth-child(3) { animation-delay: .44s; }

    .msg-time { font-size: .68rem; color: var(--text-dim); margin-top: 4px; padding: 0 4px; }

    /* ── INPUT AREA ── */
    #input-area {
      padding: 14px 16px 16px;
      background: rgba(180,210,240,.75);
      backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #input-form { display: flex; gap: 10px; align-items: flex-end; }

    #q {
      flex: 1;
      background: rgba(200,223,245,.8);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-family: inherit; font-size: .9rem;
      color: var(--text); resize: none; outline: none;
      max-height: 120px; min-height: 46px; line-height: 1.5;
      transition: border-color var(--transition);
    }
    #q::placeholder { color: var(--text-dim); }
    #q:focus { border-color: var(--gold); }

    #send-btn {
      width: 46px; height: 46px; flex-shrink: 0;
      background: var(--gold); border: none;
      border-radius: var(--radius-sm); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition); color: #fff;
    }
    #send-btn:hover:not(:disabled) { background: var(--gold-light); transform: scale(1.05); }
    #send-btn:disabled { opacity: .45; cursor: not-allowed; }
    #send-btn svg { width: 20px; height: 20px; }

    .char-hint { font-size: .7rem; color: var(--text-dim); text-align: center; margin-top: 6px; }

    /* ── Animations ── */
    @keyframes fadeIn  { from { opacity:0 } to { opacity:1 } }
    @keyframes slideUp { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }
    @keyframes dotPulse {
      0%,60%,100% { transform:translateY(0); opacity:.4 }
      30%          { transform:translateY(-5px); opacity:1 }
    }
    .streaming::after { content:'▍'; animation:blink .7s step-end infinite; color:var(--gold); }
    @keyframes blink { 50% { opacity:0 } }

    @media (max-width: 600px) {
      .bubble { max-width: 92%; }
      .suggestion-grid { grid-template-columns: 1fr; }
      .sources-row { max-width: 92%; }
    }
  </style>
</head>
<body>

<div id="bg-layer"></div>

<div id="app">

  <!-- زر مسح عائم -->
  <button id="float-clear" title="محادثة جديدة">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
    </svg>
  </button>

  <!-- CHAT -->
  <div id="chat-area">
    <div id="welcome">
      <img src="/static/logo.png" alt="شعار نزاهة" class="big-logo" onerror="this.style.display='none'" />
      <h2>مستشار نزاهة القانوني</h2>
      <div class="subtitle">هيئة مكافحة الفساد — دولة الكويت</div>
      <p class="desc">يمكنك سؤالي عن أي شيء يتعلق بقوانين ولوائح هيئة مكافحة الفساد. إجاباتي مستندة حصراً إلى الوثائق الرسمية للهيئة.</p>
      <div class="suggestion-grid">
        <button class="suggestion-btn" onclick="setQ(this.dataset.q)" data-q="ما صلاحيات هيئة مكافحة الفساد نزاهة؟">
          <span class="s-icon">🏛️</span>صلاحيات هيئة نزاهة
        </button>
        <button class="suggestion-btn" onclick="setQ(this.dataset.q)" data-q="ما الجهات الخاضعة لرقابة هيئة نزاهة؟">
          <span class="s-icon">🔍</span>الجهات الخاضعة للرقابة
        </button>
        <button class="suggestion-btn" onclick="setQ(this.dataset.q)" data-q="ما شروط تقديم الكشف عن الذمة المالية؟">
          <span class="s-icon">📋</span>الكشف عن الذمة المالية
        </button>
        <button class="suggestion-btn" onclick="setQ(this.dataset.q)" data-q="ما عقوبات الفساد المنصوص عليها في القانون؟">
          <span class="s-icon">⚖️</span>عقوبات الفساد في القانون
        </button>
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <div id="input-area">
    <form id="input-form" onsubmit="return false;">
      <textarea id="q" placeholder="اكتب سؤالك القانوني..." rows="1" autofocus></textarea>
      <button type="submit" id="send-btn" title="إرسال">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </form>
    <p class="char-hint">اضغط Enter للإرسال • Shift+Enter لسطر جديد</p>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script>
let history     = [];
let isStreaming = false;

const chatArea  = document.getElementById('chat-area');
const welcome   = document.getElementById('welcome');
const qInput    = document.getElementById('q');
const sendBtn   = document.getElementById('send-btn');
const clearBtn  = document.getElementById('float-clear');
const inputForm = document.getElementById('input-form');

marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });

function nowTime() {
  return new Date().toLocaleTimeString('ar-KW', { hour: '2-digit', minute: '2-digit' });
}
function scrollBottom(smooth = true) {
  setTimeout(() => chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: smooth ? 'smooth' : 'instant' }), 30);
}
function hideWelcome() { if (welcome) welcome.style.display = 'none'; }
function setQ(text) { qInput.value = text; qInput.dispatchEvent(new Event('input')); qInput.focus(); }

qInput.addEventListener('input', () => {
  qInput.style.height = 'auto';
  qInput.style.height = Math.min(qInput.scrollHeight, 120) + 'px';
});

function appendUserMessage(text) {
  hideWelcome();
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap user';
  wrap.innerHTML = `<div class="bubble user">${escapeHtml(text)}</div><div class="msg-time">${nowTime()}</div>`;
  chatArea.appendChild(wrap);
  scrollBottom();
}

function createBotBubble() {
  hideWelcome();
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap bot';
  wrap.innerHTML = `
    <div class="bubble bot"><div class="typing-dots"><span></span><span></span><span></span></div></div>
    <div class="sources-row" id="sources-${Date.now()}"></div>
    <div class="msg-time"></div>`;
  chatArea.appendChild(wrap);
  scrollBottom();
  return wrap;
}

function renderSources(container, sources) {
  if (!sources || !sources.length) return;
  container.innerHTML = sources.map(s => {
    const label = s.section ? `${s.source} | ${s.section}` : `${s.source} | ص${s.page}`;
    return `<div class="source-chip" title="${label}">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      ${escapeHtml(label.length > 55 ? label.substring(0, 52) + '…' : label)}
    </div>`;
  }).join('');
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function sendMessage() {
  const question = qInput.value.trim();
  if (!question || isStreaming) return;
  isStreaming = true; sendBtn.disabled = true;
  qInput.value = ''; qInput.style.height = 'auto';
  appendUserMessage(question);
  const botWrap  = createBotBubble();
  const bubble   = botWrap.querySelector('.bubble.bot');
  const srcEl    = botWrap.querySelector('[id^="sources-"]');
  const timeEl   = botWrap.querySelector('.msg-time');
  let fullText = '', streamStarted = false;
  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, history }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: 'خطأ غير معروف' }));
      bubble.className = 'bubble error';
      bubble.textContent = err.error || 'حدث خطأ في الخادم';
      return;
    }
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (!raw) continue;
        let payload;
        try { payload = JSON.parse(raw); } catch { continue; }
        if (payload.type === 'sources') renderSources(srcEl, payload.sources);
        else if (payload.type === 'text') {
          if (!streamStarted) { bubble.innerHTML = ''; streamStarted = true; }
          fullText += payload.content;
          bubble.innerHTML = marked.parse(fullText);
          bubble.classList.add('streaming');
          scrollBottom(false);
        }
        else if (payload.type === 'done') {
          bubble.classList.remove('streaming');
          history.push({ role: 'user', content: question });
          history.push({ role: 'assistant', content: fullText });
          if (history.length > 20) history = history.slice(-20);
          timeEl.textContent = nowTime();
        }
        else if (payload.type === 'error') {
          bubble.classList.remove('streaming');
          bubble.className = 'bubble error';
          bubble.textContent = payload.message || 'حدث خطأ';
        }
      }
    }
  } catch (err) {
    bubble.className = 'bubble error';
    bubble.textContent = 'تعذر الاتصال بالخادم: ' + err.message;
  } finally {
    bubble.classList.remove('streaming');
    isStreaming = false; sendBtn.disabled = false; qInput.focus(); scrollBottom();
  }
}

inputForm.addEventListener('submit', sendMessage);
qInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

clearBtn.addEventListener('click', () => {
  history = [];
  chatArea.innerHTML = '';
  const w = document.createElement('div');
  w.id = 'welcome';
  w.innerHTML = `
    <img src="/static/logo.png" alt="شعار نزاهة" class="big-logo" onerror="this.style.display='none'" />
    <h2>مستشار نزاهة القانوني</h2>
    <div class="subtitle">هيئة مكافحة الفساد — دولة الكويت</div>
    <p class="desc">يمكنك سؤالي عن أي شيء يتعلق بقوانين ولوائح هيئة مكافحة الفساد. إجاباتي مستندة حصراً إلى الوثائق الرسمية للهيئة.</p>
    <div class="suggestion-grid">
      <button class="suggestion-btn" onclick="setQ(this.dataset.q)" data-q="ما صلاحيات هيئة مكافحة الفساد نزاهة؟"><span class="s-icon">🏛️</span>صلاحيات هيئة نزاهة</button>
      <button class="suggestion-btn" onclick="setQ(this.dataset.q)" data-q="ما الجهات الخاضعة لرقابة هيئة نزاهة؟"><span class="s-icon">🔍</span>الجهات الخاضعة للرقابة</button>
      <button class="suggestion-btn" onclick="setQ(this.dataset.q)" data-q="ما شروط تقديم الكشف عن الذمة المالية؟"><span class="s-icon">📋</span>الكشف عن الذمة المالية</button>
      <button class="suggestion-btn" onclick="setQ(this.dataset.q)" data-q="ما عقوبات الفساد المنصوص عليها في القانون؟"><span class="s-icon">⚖️</span>عقوبات الفساد في القانون</button>
    </div>`;
  chatArea.appendChild(w);
  qInput.focus();
});
</script>
</body>
</html>
